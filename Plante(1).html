<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plante-dz </title>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        natureGreen: '#2e8b57',
                        natureGreenHover: '#236b43',
                        wikiBg: '#f6f6f6',
                        wikiBorder: '#a2a9b1',
                        wikiText: '#202122'
                    },
                    fontFamily: {
                        serif: ['Georgia', 'Times New Roman', 'serif'],
                        sans: ['Arial', 'Helvetica', 'sans-serif']
                    }
                }
            }
        }
        // Utility: Resize and compress image using Canvas
function resizeImage(file, maxWidth, maxHeight, callback) {
    const reader = new FileReader();
    
    reader.onload = function(event) {
        const img = new Image();
        img.onload = function() {
            let width = img.width;
            let height = img.height;

            // Calculate new dimensions while keeping aspect ratio
            if (width > height) {
                if (width > maxWidth) {
                    height = Math.round((height * maxWidth) / width);
                    width = maxWidth;
                }
            } else {
                if (height > maxHeight) {
                    width = Math.round((width * maxHeight) / height);
                    height = maxHeight;
                }
            }

            // Draw image on canvas
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);

            // Convert back to a base64 string (JPEG, 80% quality)
            const resizedBase64 = canvas.toDataURL('image/jpeg', 0.8);
            callback(resizedBase64);
        };
        img.src = event.target.result;
    };
    
    // Start reading the file
    reader.readAsDataURL(file);
}
    </script>
    <style>
        /* Custom scrollbar for textareas */
        textarea::-webkit-scrollbar {
            width: 8px;
        }
        textarea::-webkit-scrollbar-thumb {
            background-color: #a2a9b1;
            border-radius: 4px;
        }
    </style>
</head>
<body class="bg-wikiBg text-wikiText font-sans min-h-screen">

    <header class="bg-white border-b border-wikiBorder px-6 py-4 shadow-sm mb-6 flex justify-between items-center">
        <h1 class="text-3xl font-serif text-natureGreen">Plante-dz Wiki 🇩🇿</h1>
        <p class="text-sm text-gray-500 italic hidden md:block">The free encyclopedia of Algerian botanical life.</p>
    </header>

    <main class="max-w-6xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <section class="lg:col-span-1">
            <div class="bg-white border border-wikiBorder p-5 shadow-sm sticky top-6">
                <div class="border-b border-wikiBorder pb-2 mb-4">
                    <h2 class="text-xl font-serif">Contribute an Article</h2>
                </div>
                
                <form id="flora-form" class="space-y-4">
                    <div>
                        <label for="name" class="block text-sm font-bold mb-1">Plant Name</label>
                        <input type="text" id="name" required placeholder="e.g., Artemisia herba-alba" 
                            class="w-full border border-gray-300 px-3 py-2 focus:outline-none focus:border-natureGreen focus:ring-1 focus:ring-natureGreen rounded-sm">
                    </div>

                    <div>
                        <label for="category" class="block text-sm font-bold mb-1">Category</label>
                        <select id="category" required 
                            class="w-full border border-gray-300 px-3 py-2 focus:outline-none focus:border-natureGreen focus:ring-1 focus:ring-natureGreen rounded-sm bg-white">
                            <option value="" disabled selected>Select a category...</option>
                            <option value="Medical">Medical</option>
                            <option value="Nutritive">Nutritive</option>
                            <option value="Aromatic">Aromatic</option>
                        </select>
                    </div>

                   <div>
    <label for="image" class="block text-sm font-bold mb-1">Upload Plant Image</label>
    <input type="file" id="image" accept="image/*" required 
        class="w-full border border-gray-300 px-3 py-2 focus:outline-none focus:border-natureGreen focus:ring-1 focus:ring-natureGreen rounded-sm bg-white file:mr-4 file:py-1 file:px-3 file:border-0 file:bg-natureGreen file:text-white hover:file:bg-natureGreenHover cursor-pointer">
</div>
                    <div>
                        <label for="description" class="block text-sm font-bold mb-1">Description</label>
                        <p class="text-xs text-gray-500 mb-1">Explain the plant's relation to its category,where it is cultivate in Algeria or in the north Africa</p>
                        <textarea id="description" required rows="4" placeholder="Briefly describe its properties..."
                            class="w-full border border-gray-300 px-3 py-2 focus:outline-none focus:border-natureGreen focus:ring-1 focus:ring-natureGreen rounded-sm"></textarea>
                    </div>

                    <button type="submit" 
                        class="w-full bg-natureGreen text-white font-bold py-2 px-4 rounded-sm hover:bg-natureGreenHover transition-colors">
                        Share Article
                    </button>
                </form>
            </div>
        </section>

        <section class="lg:col-span-2">
            <div class="border-b border-wikiBorder pb-2 mb-6">
                <h2 class="text-2xl font-serif">Discovery Feed</h2>
            </div>
            
            <div id="articles-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                </div>

            <div id="empty-state" class="hidden text-center py-12 text-gray-500">
                <p>No articles found. Be the first to contribute!</p>
            </div>
        </section>
    </main>

    <script>
        // DOM Elements
        const form = document.getElementById('flora-form');
        const container = document.getElementById('articles-container');
        const emptyState = document.getElementById('empty-state');

        // State Management
        let plants = JSON.parse(localStorage.getItem('algeriaFlora')) || [];

        // Helper: Get badge color based on category
        function getBadgeColor(category) {
            switch(category) {
                case 'Medical': return 'bg-red-100 text-red-800 border-red-200';
                case 'Nutritive': return 'bg-blue-100 text-blue-800 border-blue-200';
                case 'Aromatic': return 'bg-purple-100 text-purple-800 border-purple-200';
                default: return 'bg-gray-100 text-gray-800 border-gray-200';
            }
        }

        // Render Articles
        function renderArticles() {
            container.innerHTML = '';
            
            if (plants.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                
                plants.forEach((plant, index) => {
                    const card = document.createElement('div');
                    card.className = 'bg-white border border-wikiBorder shadow-sm flex flex-col h-full hover:shadow-md transition-shadow';
                    
                    card.innerHTML = `
                        <div class="h-48 overflow-hidden border-b border-wikiBorder relative">
                            <img src="${plant.image}" alt="${plant.name}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/400x300?text=Image+Not+Found'">
                            <span class="absolute top-2 right-2 px-2 py-1 text-xs font-bold uppercase rounded-sm border shadow-sm ${getBadgeColor(plant.category)}">
                                ${plant.category}
                            </span>
                        </div>
                        <div class="p-4 flex-grow flex flex-col">
                            <h3 class="text-xl font-serif text-natureGreen mb-2 leading-tight">${plant.name}</h3>
                            <p class="text-sm text-gray-700 flex-grow mb-4 leading-relaxed">${plant.description}</p>
                            <div class="mt-auto border-t border-gray-100 pt-3 text-right">
                                <button onclick="deleteArticle(${index})" class="text-sm text-red-600 hover:text-red-800 hover:underline">
                                    [Delete]
                                </button>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            }
        }

        // Add Article with Image Resizing
form.addEventListener('submit', function(e) {
    e.preventDefault();

    const fileInput = document.getElementById('image');
    const file = fileInput.files[0];

    if (file) {
        // Resize image to max 800x800 pixels before saving
        resizeImage(file, 800, 800, function(resizedImageData) {
            
            // Get form values
            const newPlant = {
                name: document.getElementById('name').value.trim(),
                category: document.getElementById('category').value,
                image: resizedImageData, // Save the resized base64 string instead of a URL
                description: document.getElementById('description').value.trim(),
            };

            // Update State & LocalStorage
            plants.unshift(newPlant);
            localStorage.setItem('algeriaFlora', JSON.stringify(plants));

            // Reset form and re-render
            form.reset();
            renderArticles();
        });
    }
});// Add Article with Image Resizing

            // Delete Article
        window.deleteArticle = function(index) {
            if(confirm('Are you sure you want to delete this article?')) {
                plants.splice(index, 1);
                localStorage.setItem('algeriaFlora', JSON.stringify(plants));
                renderArticles();
            }
        };

        // Initial Render
        renderArticles();
    </script>
</body>
</html>
